# nginx configuration for the Qing Malaya admin console.
#
# Serves the built React SPA and reverse-proxies /api requests to the
# NestJS backend (the "server" service in docker-compose). The server has
# a global prefix of /api, so we pass the full URI through unchanged.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (podcast audio can be up to ~200 MB).
    client_max_body_size 200M;

    # SPA fallback: serve index.html for any route not matching a static file.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy all /api requests to the NestJS server.
    # No trailing slash on proxy_pass → the /api prefix is preserved.
    location /api {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
