# nginx configuration for the Qing Malaya mobile H5 app.
#
# Serves the built Taro H5 bundle with an SPA fallback.
#
# NOTE: The mobile app's request.ts currently hardcodes API_BASE_URL to
# "http://localhost:3000/api". In a Docker deployment the browser must be
# able to reach the server's port 3000 on the host. The /api proxy below is
# included for future use when API_BASE_URL is changed to a relative path
# ("/api"), at which point requests would flow through this nginx.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200M;

    # SPA fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy /api to the NestJS server (for future use with relative
    # API_BASE_URL). No trailing slash → /api prefix is preserved.
    location /api {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
