<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>万卷回响 - Audio Recording</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .waveform-bar {
            transition: height 0.1s ease-in-out;
        }
        /* Custom scrollbar for waveform sliding */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            background-color: rgba(251, 249, 248, 0.8);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#bbe9ff",
                        "on-surface": "#1b1c1c",
                        "surface-container": "#efeded",
                        "tertiary-fixed": "#d9e6da",
                        "primary": "#4d6265",
                        "primary-fixed-dim": "#b4cbce",
                        "surface-dim": "#dbdad9",
                        "surface-container-low": "#f5f3f3",
                        "tertiary-container": "#e9f6ea",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#364a4d",
                        "primary-fixed": "#d0e7ea",
                        "on-error-container": "#93000a",
                        "surface-bright": "#fbf9f8",
                        "surface-container-high": "#e9e8e7",
                        "primary-container": "#e0f7fa",
                        "on-secondary-container": "#37697d",
                        "surface-variant": "#e3e2e2",
                        "tertiary-fixed-dim": "#bdcabe",
                        "on-tertiary-fixed-variant": "#3e4a41",
                        "surface": "#fbf9f8",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#154d5f",
                        "on-primary-fixed": "#091f21",
                        "on-background": "#1b1c1c",
                        "inverse-on-surface": "#f2f0f0",
                        "secondary-fixed-dim": "#9ccee4",
                        "on-tertiary-container": "#657168",
                        "on-tertiary-fixed": "#131e17",
                        "secondary-container": "#b5e7fe",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#424849",
                        "outline": "#727879",
                        "surface-tint": "#4d6265",
                        "on-primary-container": "#5d7275",
                        "inverse-primary": "#b4cbce",
                        "secondary": "#326578",
                        "background": "#fbf9f8",
                        "outline-variant": "#c2c7c8",
                        "on-secondary-fixed": "#001f29",
                        "error-container": "#ffdad6",
                        "tertiary": "#556158",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#303031",
                        "surface-container-highest": "#e3e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "12px",
                        "gutter": "12px",
                        "xs": "8px",
                        "base": "4px",
                        "xl": "32px",
                        "container-padding": "20px",
                        "md": "16px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "headline-md-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-md-mobile": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md selection:bg-secondary-container">
<!-- Task suppression: No TopNavBar or BottomNavBar as this is a focused task page -->
<div class="relative min-h-screen flex flex-col max-w-md mx-auto overflow-hidden">
<!-- Header -->
<header class="flex justify-between items-center px-gutter h-16 w-full z-10">
<button class="text-primary font-body-md text-body-md hover:opacity-80 active:scale-95 transition-all">
                取消
            </button>
<h1 class="font-headline-sm text-headline-sm text-on-surface">录制音频</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Recording Area -->
<main class="flex-1 flex flex-col justify-center items-center px-gutter py-xl relative">
<!-- Background Decoration (Light Arcs) -->
<div class="absolute inset-0 pointer-events-none opacity-20 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 border border-primary/20 rounded-full"></div>
<div class="absolute top-1/2 -right-48 w-80 h-80 border border-secondary/10 rounded-full"></div>
</div>
<!-- Duration Display -->
<div class="mb-xl text-center z-10">
<p class="font-display-lg text-display-lg tracking-tighter text-on-surface tabular-nums" id="timer">00:00.00</p>
<p class="text-on-surface-variant font-label-md text-label-md mt-base uppercase tracking-widest">Recording Status</p>
</div>
<!-- Dynamic Waveform Visualizer -->
<div class="w-full h-48 relative flex items-center justify-center z-10">
<!-- Center Playhead Indicator -->
<div class="absolute left-1/2 top-0 bottom-0 w-0.5 bg-error z-20 rounded-full shadow-[0_0_8px_rgba(186,26,26,0.3)]"></div>
<!-- Waveform Container (Scrollable for playback/positioning) -->
<div class="w-full h-full flex items-center gap-1 overflow-x-auto no-scrollbar px-[50%] pointer-events-auto cursor-grab active:cursor-grabbing" id="waveform-scroll">
<!-- Bars generated via JS -->
<div class="flex items-center gap-[3px] h-full" id="waveform-content">
<!-- Initial set of bars -->
</div>
</div>
</div>
<!-- Date/Context Label -->
<div class="mt-xl z-10">
<div class="bg-surface-container px-md py-xs rounded-full flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">calendar_today</span>
<span class="font-label-md text-label-md text-on-surface-variant">今天, 14:20</span>
</div>
</div>
</main>
<!-- Bottom Controls -->
<footer class="p-gutter pb-xl z-10">
<div class="flex items-center justify-between gap-md max-w-sm mx-auto">
<!-- Context Action (Replace/Continue) -->
<div class="flex-1 flex flex-col items-center gap-xs">
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-surface-variant active:scale-95 transition-all" id="replace-btn">
<span class="material-symbols-outlined" data-icon="replay">replay</span>
</button>
<span class="font-label-sm text-label-sm text-on-surface-variant">替换</span>
</div>
<!-- Main Action (Record/Pause/Play) -->
<div class="relative">
<!-- Outer ring effect -->
<div class="absolute inset-0 -m-2 rounded-full border-2 border-primary/20 animate-pulse hidden" id="record-ring"></div>
<button class="w-20 h-20 rounded-full bg-error flex items-center justify-center text-white shadow-lg active:scale-90 transition-all z-20" id="main-action-btn">
<span class="material-symbols-outlined text-[40px]" data-icon="mic" id="main-icon" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Done Action -->
<div class="flex-1 flex flex-col items-center gap-xs">
<button class="w-12 h-12 rounded-full bg-primary text-on-primary flex items-center justify-center hover:opacity-90 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="check">check</span>
</button>
<span class="font-label-sm text-label-sm text-on-surface-variant">完成</span>
</div>
</div>
</footer>
</div>
<script>
        const waveformContent = document.getElementById('waveform-content');
        const waveformScroll = document.getElementById('waveform-scroll');
        const mainActionBtn = document.getElementById('main-action-btn');
        const mainIcon = document.getElementById('main-icon');
        const timerDisplay = document.getElementById('timer');
        const recordRing = document.getElementById('record-ring');
        
        let isRecording = false;
        let startTime;
        let timerInterval;
        let barInterval;

        // Initialize with some "past" silent bars
        for (let i = 0; i < 40; i++) {
            createBar(Math.random() * 10 + 4);
        }

        function createBar(height) {
            const bar = document.createElement('div');
            bar.className = 'waveform-bar w-[3px] bg-outline-variant rounded-full shrink-0';
            bar.style.height = `${height}px`;
            waveformContent.appendChild(bar);
            
            // Auto scroll to end during recording
            if (isRecording) {
                waveformScroll.scrollTo({
                    left: waveformScroll.scrollWidth,
                    behavior: 'smooth'
                });
            }
        }

        function updateTimer() {
            const now = Date.now();
            const diff = now - startTime;
            const minutes = Math.floor(diff / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            const milliseconds = Math.floor((diff % 1000) / 10);
            
            timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(milliseconds).padStart(2, '0')}`;
        }

        function toggleRecording() {
            isRecording = !isRecording;
            
            if (isRecording) {
                // Start Recording
                mainActionBtn.classList.replace('bg-error', 'bg-on-surface');
                mainIcon.textContent = 'pause';
                mainIcon.setAttribute('data-icon', 'pause');
                recordRing.classList.remove('hidden');
                
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 30);
                
                // Simulate Waveform
                barInterval = setInterval(() => {
                    const h = Math.random() * 60 + 10;
                    createBar(h);
                    // Add current-state styling to recent bars
                    const lastBar = waveformContent.lastElementChild;
                    lastBar.classList.replace('bg-outline-variant', 'bg-error');
                }, 100);
                
            } else {
                // Pause Recording
                mainActionBtn.classList.replace('bg-on-surface', 'bg-error');
                mainIcon.textContent = 'mic';
                mainIcon.setAttribute('data-icon', 'mic');
                recordRing.classList.add('hidden');
                
                clearInterval(timerInterval);
                clearInterval(barInterval);
            }
        }

        mainActionBtn.addEventListener('click', toggleRecording);

        // Micro-interaction: Drag to position
        let isDown = false;
        let startX;
        let scrollLeft;

        waveformScroll.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - waveformScroll.offsetLeft;
            scrollLeft = waveformScroll.scrollLeft;
        });
        waveformScroll.addEventListener('mouseleave', () => isDown = false);
        waveformScroll.addEventListener('mouseup', () => isDown = false);
        waveformScroll.addEventListener('mousemove', (e) => {
            if (!isDown || isRecording) return;
            e.preventDefault();
            const x = e.pageX - waveformScroll.offsetLeft;
            const walk = (x - startX) * 2;
            waveformScroll.scrollLeft = scrollLeft - walk;
        });

        // Touch support
        waveformScroll.addEventListener('touchstart', (e) => {
            if (isRecording) return;
            isDown = true;
            startX = e.touches[0].pageX - waveformScroll.offsetLeft;
            scrollLeft = waveformScroll.scrollLeft;
        });
        waveformScroll.addEventListener('touchend', () => isDown = false);
        waveformScroll.addEventListener('touchmove', (e) => {
            if (!isDown || isRecording) return;
            const x = e.touches[0].pageX - waveformScroll.offsetLeft;
            const walk = (x - startX) * 1.5;
            waveformScroll.scrollLeft = scrollLeft - walk;
        });

    </script>
</body></html>
