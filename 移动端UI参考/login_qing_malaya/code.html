<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>万卷回响 - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#bbe9ff",
                    "on-surface": "#1b1c1c",
                    "surface-container": "#efeded",
                    "tertiary-fixed": "#d9e6da",
                    "primary": "#4d6265",
                    "primary-fixed-dim": "#b4cbce",
                    "surface-dim": "#dbdad9",
                    "surface-container-low": "#f5f3f3",
                    "tertiary-container": "#e9f6ea",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#364a4d",
                    "primary-fixed": "#d0e7ea",
                    "on-error-container": "#93000a",
                    "surface-bright": "#fbf9f8",
                    "surface-container-high": "#e9e8e7",
                    "primary-container": "#e0f7fa",
                    "on-secondary-container": "#37697d",
                    "surface-variant": "#e3e2e2",
                    "tertiary-fixed-dim": "#bdcabe",
                    "on-tertiary-fixed-variant": "#3e4a41",
                    "surface": "#fbf9f8",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed-variant": "#154d5f",
                    "on-primary-fixed": "#091f21",
                    "on-background": "#1b1c1c",
                    "inverse-on-surface": "#f2f0f0",
                    "secondary-fixed-dim": "#9ccee4",
                    "on-tertiary-container": "#657168",
                    "on-tertiary-fixed": "#131e17",
                    "secondary-container": "#b5e7fe",
                    "on-primary": "#ffffff",
                    "on-surface-variant": "#424849",
                    "outline": "#727879",
                    "surface-tint": "#4d6265",
                    "on-primary-container": "#5d7275",
                    "inverse-primary": "#b4cbce",
                    "secondary": "#326578",
                    "background": "#fbf9f8",
                    "outline-variant": "#c2c7c8",
                    "on-secondary-fixed": "#001f29",
                    "error-container": "#ffdad6",
                    "tertiary": "#556158",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "inverse-surface": "#303031",
                    "surface-container-highest": "#e3e2e2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "12px",
                    "gutter": "12px",
                    "xs": "8px",
                    "base": "4px",
                    "xl": "32px",
                    "container-padding": "20px",
                    "md": "16px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "headline-md-mobile": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "display-lg": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-md-mobile": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .glass-card {
            background: rgba(251, 249, 248, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(114, 120, 121, 0.1);
        }

        .light-arc {
            position: absolute;
            width: 150%;
            height: 150%;
            border-radius: 50%;
            border: 1px solid rgba(77, 98, 101, 0.05);
            pointer-events: none;
            z-index: 0;
        }

        .arc-1 { top: -20%; left: -25%; animation: float 20s infinite alternate ease-in-out; }
        .arc-2 { bottom: -10%; right: -30%; animation: float 25s infinite alternate-reverse ease-in-out; }

        @keyframes float {
            0% { transform: rotate(0deg) translate(0, 0); }
            100% { transform: rotate(5deg) translate(20px, 40px); }
        }

        .login-button-gradient {
            background: linear-gradient(135deg, #4d6265 0%, #326578 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden h-screen w-full flex items-center justify-center relative">
<!-- Background Decoration -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="light-arc arc-1"></div>
<div class="light-arc arc-2"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-container-padding">
<div class="glass-card rounded-xl p-lg shadow-sm flex flex-col items-center">
<!-- Logo Section -->
<header class="text-center mb-xl">
<div class="mb-md">
<span class="material-symbols-outlined text-primary text-display-lg" style="font-variation-settings: 'FILL' 1;">
                        mic_external_on
                    </span>
</div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">万卷回响</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-xs tracking-widest opacity-80 uppercase">G25学生播客平台</p>
</header>
<!-- Login Form -->
<form action="#" class="w-full space-y-md" onsubmit="event.preventDefault();">
<div class="space-y-xs">
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
                            badge
                        </span>
<input class="w-full h-14 pl-12 pr-md bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-body-md placeholder:text-outline-variant transition-all" placeholder="学号 (Student ID)" type="text"/>
</div>
</div>
<div class="space-y-xs">
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
                            lock
                        </span>
<input class="w-full h-14 pl-12 pr-md bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-body-md placeholder:text-outline-variant transition-all" placeholder="密码 (Password)" type="password"/>
</div>
</div>
<div class="pt-sm">
<button class="w-full h-14 login-button-gradient text-on-primary font-label-md text-label-md rounded-full shadow-md active:scale-[0.98] transition-transform duration-200 flex items-center justify-center gap-xs" type="submit">
<span>立即登录</span>
<span class="material-symbols-outlined text-[20px]">
                            arrow_forward
                        </span>
</button>
</div>
</form>
<!-- Bottom Disclaimer -->
<footer class="mt-xl text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant/60 leading-relaxed">
                    仅限本校师生使用，使用学号快捷登录
                </p>
</footer>
</div>
<!-- Decorative Image/Context Visual -->
<div class="mt-lg flex justify-center opacity-40">
<div class="flex items-center gap-sm">
<div class="w-xs h-xs bg-primary rounded-full"></div>
<div class="w-xs h-xs bg-outline-variant rounded-full"></div>
<div class="w-xs h-xs bg-outline-variant rounded-full"></div>
</div>
</div>
</main>
<!-- Optional micro-interaction for visual feedback -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.glass-card').style.boxShadow = '0 10px 30px -10px rgba(77, 98, 101, 0.1)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.glass-card').style.boxShadow = '0 4px 20px rgba(0,0,0,0.04)';
            });
        });
    </script>
</body></html>
