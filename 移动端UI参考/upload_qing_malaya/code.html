<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#bbe9ff",
                    "on-surface": "#1b1c1c",
                    "surface-container": "#efeded",
                    "tertiary-fixed": "#d9e6da",
                    "primary": "#4d6265",
                    "primary-fixed-dim": "#b4cbce",
                    "surface-dim": "#dbdad9",
                    "surface-container-low": "#f5f3f3",
                    "tertiary-container": "#e9f6ea",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#364a4d",
                    "primary-fixed": "#d0e7ea",
                    "on-error-container": "#93000a",
                    "surface-bright": "#fbf9f8",
                    "surface-container-high": "#e9e8e7",
                    "primary-container": "#e0f7fa",
                    "on-secondary-container": "#37697d",
                    "surface-variant": "#e3e2e2",
                    "tertiary-fixed-dim": "#bdcabe",
                    "on-tertiary-fixed-variant": "#3e4a41",
                    "surface": "#fbf9f8",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed-variant": "#154d5f",
                    "on-primary-fixed": "#091f21",
                    "on-background": "#1b1c1c",
                    "inverse-on-surface": "#f2f0f0",
                    "secondary-fixed-dim": "#9ccee4",
                    "on-tertiary-container": "#657168",
                    "on-tertiary-fixed": "#131e17",
                    "secondary-container": "#b5e7fe",
                    "on-primary": "#ffffff",
                    "on-surface-variant": "#424849",
                    "outline": "#727879",
                    "surface-tint": "#4d6265",
                    "on-primary-container": "#5d7275",
                    "inverse-primary": "#b4cbce",
                    "secondary": "#326578",
                    "background": "#fbf9f8",
                    "outline-variant": "#c2c7c8",
                    "on-secondary-fixed": "#001f29",
                    "error-container": "#ffdad6",
                    "tertiary": "#556158",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "inverse-surface": "#303031",
                    "surface-container-highest": "#e3e2e2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "12px",
                    "gutter": "12px",
                    "xs": "8px",
                    "base": "4px",
                    "xl": "32px",
                    "container-padding": "20px",
                    "md": "16px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "headline-md-mobile": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "display-lg": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-md-mobile": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen pb-48">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl flex justify-between items-center px-gutter h-16 border-none">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-200 text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">上传播客</h1>
</div>
<button class="px-5 py-2 rounded-full bg-primary/20 text-on-surface-variant font-label-md cursor-not-allowed opacity-50" disabled="">
            Publish
        </button>
</header>
<main class="mt-20 px-container-padding max-w-2xl mx-auto space-y-8">
<!-- Cover Upload -->
<section class="flex flex-col items-center">
<div class="relative group cursor-pointer w-48 h-48 bg-surface-container-high rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-3 transition-all hover:bg-surface-container-highest active:scale-[0.98]">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_photo_alternate</span>
</div>
<span class="font-label-md text-on-surface-variant">点击上传封面</span>
<!-- Background Image Placeholder (Hidden by default) -->
<div class="absolute inset-0 rounded-xl opacity-0 transition-opacity group-hover:opacity-10 bg-cover bg-center" data-alt="A minimalist, professional square podcast cover featuring abstract geometric shapes in shades of sage green and slate blue. The lighting is soft and diffused, creating a serene academic atmosphere. High-resolution digital art style with clean lines and a sense of focused calm and intellectual growth.">
</div>
</div>
</section>
<!-- Form Inputs -->
<div class="space-y-6">
<!-- Podcast Name -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-on-surface-variant uppercase tracking-wider">播客名称</label>
<span class="text-[10px] text-outline">0/40</span>
</div>
<input class="w-full h-12 bg-surface-container-low border-none rounded-xl px-4 focus:ring-2 focus:ring-primary/20 text-body-lg placeholder:text-outline-variant transition-all" placeholder="输入你的播客标题..." type="text"/>
</div>
<!-- Intro -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant px-1 uppercase tracking-wider">内容简介</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-4 focus:ring-2 focus:ring-primary/20 text-body-md placeholder:text-outline-variant transition-all resize-none" placeholder="向听众介绍你的播客内容..." rows="4"></textarea>
</div>
<!-- Tags -->
<div class="space-y-4">
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant px-1 uppercase tracking-wider">添加标签</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container-low border-none rounded-xl pl-4 pr-12 focus:ring-2 focus:ring-primary/20 text-body-md placeholder:text-outline-variant transition-all" placeholder="按回车添加标签..." type="text"/>
<span class="material-symbols-outlined absolute right-4 top-3 text-outline-variant">sell</span>
</div>
</div>
<div class="space-y-3">
<span class="font-label-sm text-outline-variant px-1">热门推荐</span>
<div class="flex flex-wrap gap-2">
<span class="px-3 py-1.5 rounded-full bg-secondary-container/15 text-on-secondary-container font-label-md cursor-pointer hover:bg-secondary-container/25 transition-colors"># 哲学思辨</span>
<span class="px-3 py-1.5 rounded-full bg-tertiary-container/15 text-on-tertiary-container font-label-md cursor-pointer hover:bg-tertiary-container/25 transition-colors"># 设计周刊</span>
<span class="px-3 py-1.5 rounded-full bg-primary-container/30 text-on-primary-container font-label-md cursor-pointer hover:bg-primary-container/40 transition-colors"># 心理学</span>
<span class="px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-md cursor-pointer hover:bg-outline-variant/20 transition-colors"># 校园生活</span>
</div>
</div>
</div>
<!-- Audio Actions -->
<div class="grid grid-cols-2 gap-4 pt-4">
<button class="flex flex-col items-center justify-center gap-3 p-6 rounded-2xl bg-surface-container border border-outline-variant/10 hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined">audio_file</span>
</div>
<span class="font-label-md text-primary">从本地选择音频</span>
</button>
<button class="flex flex-col items-center justify-center gap-3 p-6 rounded-2xl bg-primary-container border border-primary/5 hover:bg-primary-fixed transition-all active:scale-[0.98]">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<span class="font-label-md text-on-primary-container">打开录音</span>
</button>
</div>
</div>
</main>
<!-- Integrated Playback Bar (Level 2 Floating Island) -->
<div class="fixed bottom-24 left-4 right-4 rounded-xl z-40 bg-surface/80 backdrop-blur-xl border-t border-primary/10 shadow-sm flex items-center justify-between px-4 h-14">
<!-- Progress Bar at Top -->
<div class="absolute top-0 left-0 h-0.5 bg-primary/20 w-full rounded-t-xl overflow-hidden">
<div class="h-full bg-primary w-1/3 transition-all duration-500"></div>
</div>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-surface-container-high overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A small artistic portrait of a student speaking into a vintage microphone, rendered in a soft, minimalist aesthetic with pastel academic colors. The lighting is focused and warm, symbolizing a creative academic session." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMa1NX4ZJKJpaBHkTRCgjU4c_Oy9hInigEDuNL0dq2lmiDDyB_LrQgheNf-j24boOG36E-G0h4Og7tJ4d7LFh9OR8JE27mMBc7FCKSmkbOfKOkRR7iBX2ZRQ1LdmVYT8qDCytJE-CK6fGo4tLqzbUUKhjPSqd7Z6A8z4uPct4rd3x2R1Ho20nwvg6o3bmk-kNRnxOtNMe7LGOb_OezfjSI6yfQ3cdvYdtu_qtck918v8RyIj870tGjPw"/>
</div>
<div class="flex flex-col">
<span class="text-body-md font-medium text-primary leading-tight">未命名的音频剪辑</span>
<span class="text-[10px] text-outline-variant">正在播放...</span>
</div>
</div>
<div class="flex items-center gap-4">
<button class="text-primary active:scale-95 transition-transform"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span></button>
<button class="text-primary active:scale-95 transition-transform"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pause</span></button>
</div>
</div>
<!-- Bottom Navigation Bar (Floating Island) -->
<nav class="fixed bottom-4 left-4 right-4 rounded-full z-50 bg-surface/80 backdrop-blur-xl border border-outline-variant/20 shadow-sm flex justify-around items-center h-16 px-2">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary/5 rounded-full p-2 transition-all" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-label-sm text-label-sm">Discovery</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary/5 rounded-full p-2 transition-all" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-label-sm text-label-sm">Browse</span>
</a>
<!-- Active Tab: + (Creation) -->
<a class="flex flex-col items-center justify-center text-primary bg-primary/10 rounded-full p-3 active:scale-95 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary/5 rounded-full p-2 transition-all" href="#">
<span class="material-symbols-outlined">mic</span>
<span class="font-label-sm text-label-sm">Creation</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary/5 rounded-full p-2 transition-all" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>
</nav>
<script>
        // Micro-interactions for form inputs
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.classList.add('bg-white');
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.classList.remove('bg-white');
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Toggle Publish button state (demo)
        const nameInput = document.querySelector('input[type="text"]');
        const publishBtn = document.querySelector('header button');
        nameInput.addEventListener('input', (e) => {
            if (e.target.value.length > 3) {
                publishBtn.disabled = false;
                publishBtn.classList.remove('bg-primary/20', 'text-on-surface-variant', 'opacity-50', 'cursor-not-allowed');
                publishBtn.classList.add('bg-primary', 'text-white', 'active:scale-95');
            } else {
                publishBtn.disabled = true;
                publishBtn.classList.add('bg-primary/20', 'text-on-surface-variant', 'opacity-50', 'cursor-not-allowed');
                publishBtn.classList.remove('bg-primary', 'text-white', 'active:scale-95');
            }
        });
    </script>
</body></html>
